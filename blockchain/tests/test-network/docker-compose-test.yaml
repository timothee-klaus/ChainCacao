version: '3.7'

networks:
  chaincacao_test:
    name: chaincacao_test_network

volumes:
  orderer.test.chaincacao.com:
  peer0.test.chaincacao.com:
  ca.test.chaincacao.com:

services:
  ca.test.chaincacao.com:
    image: hyperledger/fabric-ca:${CA_IMAGE_TAG:-1.5}
    restart: always
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-test
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=17054
      - FABRIC_CA_SERVER_REGISTRAR_NAME=${CA_ADMIN_NAME:-admin}
      - FABRIC_CA_SERVER_REGISTRAR_PASS=${CA_ADMIN_PASSWORD:-adminpw}
      - FABRIC_CA_SERVER_CSR_HOSTS=localhost,ca.test.chaincacao.com
    ports:
      - "17054:17054"
    command: fabric-ca-server start -b ${CA_ADMIN_NAME:-admin}:${CA_ADMIN_PASSWORD:-adminpw} -d
    volumes:
      - ./organizations/fabric-ca/test:/etc/hyperledger/fabric-ca-server
    container_name: ca_test
    networks:
      - chaincacao_test

  orderer.test.chaincacao.com:
    container_name: orderer.test.chaincacao.com
    image: hyperledger/fabric-orderer:${IMAGE_TAG:-2.5}
    restart: always
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=17050
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=none
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:17053
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric
    command: orderer
    volumes:
        - ./organizations/ordererOrganizations/test.chaincacao.com/orderers/orderer.test.chaincacao.com/msp:/var/hyperledger/orderer/msp
        - ./organizations/ordererOrganizations/test.chaincacao.com/orderers/orderer.test.chaincacao.com/tls/:/var/hyperledger/orderer/tls
        - orderer.test.chaincacao.com:/var/hyperledger/production/orderer
    ports:
      - 17050:17050
      - 17053:17053
    networks:
      - chaincacao_test

  peer0.test.chaincacao.com:
    container_name: peer0.test.chaincacao.com
    image: hyperledger/fabric-peer:${IMAGE_TAG:-2.5}
    restart: always
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=chaincacao_test_network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.test.chaincacao.com
      - CORE_PEER_ADDRESS=peer0.test.chaincacao.com:17051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:17051
      - CORE_PEER_CHAINCODEADDRESS=peer0.test.chaincacao.com:17052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:17052
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.test.chaincacao.com:17051
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.test.chaincacao.com:17051
      - CORE_PEER_GOSSIP_USELEADERELECTION=true
      - CORE_PEER_GOSSIP_ORGLEADER=false
      - CORE_PEER_LOCALMSPID=OrgTestMSP
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb_test:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    volumes:
        - /var/run/:/host/var/run/
        - ./organizations/peerOrganizations/test.chaincacao.com/peers/peer0.test.chaincacao.com/msp:/etc/hyperledger/fabric/msp
        - ./organizations/peerOrganizations/test.chaincacao.com/peers/peer0.test.chaincacao.com/tls:/etc/hyperledger/fabric/tls
        - peer0.test.chaincacao.com:/var/hyperledger/production
    ports:
      - 17051:17051
    depends_on:
      - couchdb_test
    networks:
      - chaincacao_test

  couchdb_test:
    container_name: couchdb_test
    image: couchdb:3.1.1
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - 15984:5984
    networks:
      - chaincacao_test

  cli:
    container_name: cli_test
    image: hyperledger/fabric-tools:${IMAGE_TAG:-2.5}
    tty: true
    stdin_open: true
    environment:
      - GOPATH=/opt/gopath
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=cli
      - CORE_PEER_ADDRESS=peer0.test.chaincacao.com:17051
      - CORE_PEER_LOCALMSPID=OrgTestMSP
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/organizations/peerOrganizations/test.chaincacao.com/peers/peer0.test.chaincacao.com/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/organizations/peerOrganizations/test.chaincacao.com/peers/peer0.test.chaincacao.com/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/organizations/peerOrganizations/test.chaincacao.com/peers/peer0.test.chaincacao.com/tls/ca.crt
      - CORE_PEER_MSPCONFIGPATH=/opt/gopath/src/github.com/hyperledger/fabric/peer/organizations/peerOrganizations/test.chaincacao.com/users/Admin@test.chaincacao.com/msp
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: /bin/bash
    volumes:
        - /var/run/:/host/var/run/
        - ./:/opt/gopath/src/github.com/hyperledger/fabric/peer
        - ../chaincode-test:/opt/gopath/src/github.com/hyperledger/fabric-samples/chaincode-test
    networks:
      - chaincacao_test
