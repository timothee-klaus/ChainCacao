################################################################################
#   CAPABILITIES
################################################################################
Capabilities:
  Channel: &ChannelCapabilities
    V2_0: true
  Orderer: &OrdererCapabilities
    V2_0: true
  Application: &ApplicationCapabilities
    V2_0: true

################################################################################
#   ORDERER - Single Orderer Configuration
################################################################################
Orderer: &OrdererDefaults
  OrdererType: etcdraft

  # Single orderer address
  Addresses:
    - orderer.chaincacao.com:7050

  # EtcdRaft configuration for single orderer
  EtcdRaft:
    Consenters:
      - Host: orderer.chaincacao.com
        Port: 7050
        ClientTLSCert: ../organizations/ordererOrganizations/chaincacao.com/orderers/orderer.chaincacao.com/tls/server.crt
        ServerTLSCert: ../organizations/ordererOrganizations/chaincacao.com/orderers/orderer.chaincacao.com/tls/server.crt

  # Batch configuration
  BatchTimeout: 2s
  BatchSize:
    MaxMessageCount: 10
    AbsoluteMaxBytes: 99 MB
    PreferredMaxBytes: 512 KB

  # Orderer policies
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    BlockValidation:
      Type: ImplicitMeta
      Rule: "ANY Writers"

  Capabilities:
    <<: *OrdererCapabilities

################################################################################
#   APPLICATION
################################################################################
Application: &ApplicationDefaults
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    Endorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"

  Capabilities:
    <<: *ApplicationCapabilities

################################################################################
#   CHANNEL
################################################################################
Channel: &ChannelDefaults
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"

  Capabilities:
    <<: *ChannelCapabilities

################################################################################
#   PROFILES
################################################################################
Profiles:
  ChainCacaoOrdererGenesis:
    <<: *ChannelDefaults

    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *OrdererOrg

      Capabilities:
        <<: *OrdererCapabilities

    Consortiums:
      SampleConsortium:
        Organizations:
          - *OrgProducteurs
          - *OrgExportateurs
          - *OrgCertif
          - *OrgMinistere
          - *OrgTransformateurs

  ChainCacaoChannel:
    Consortium: SampleConsortium

    <<: *ChannelDefaults

    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *OrgProducteurs
        - *OrgExportateurs
        - *OrgCertif
        - *OrgMinistere
        - *OrgTransformateurs

      Capabilities:
        <<: *ApplicationCapabilities
