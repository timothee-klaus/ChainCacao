Organizations:
    - &OrdererOrg
        Name: OrdererOrg
        ID: OrdererMSP
        MSPDir: ../organizations/ordererOrganizations/chaincacao.com/msp
        Policies:
            Readers:
                Type: Signature
                Rule: "OR('OrdererMSP.member')"
            Writers:
                Type: Signature
                Rule: "OR('OrdererMSP.member')"
            Admins:
                Type: Signature
                Rule: "OR('OrdererMSP.admin')"

    - &OrgProducteurs
        Name: OrgProducteurs
        ID: OrgProducteursMSP
        MSPDir: ../organizations/peerOrganizations/producteurs.chaincacao.com/msp
        Policies:
            Readers:
                Type: Signature
                Rule: "OR('OrgProducteursMSP.admin', 'OrgProducteursMSP.peer', 'OrgProducteursMSP.client')"
            Writers:
                Type: Signature
                Rule: "OR('OrgProducteursMSP.admin', 'OrgProducteursMSP.client')"
            Admins:
                Type: Signature
                Rule: "OR('OrgProducteursMSP.admin')"
            Endorsement:
                Type: Signature
                Rule: "OR('OrgProducteursMSP.peer')"
        AnchorPeers:
            - Host: peer0.producteurs.chaincacao.com
              Port: 7051

