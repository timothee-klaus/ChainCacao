version: '3.7'

networks:
  chaincacao:
    name: chaincacao_network

volumes:
  orderer.chaincacao.com:
  peer0.producteurs.chaincacao.com:
  peer0.exportateurs.chaincacao.com:
  peer0.certif.chaincacao.com:
  peer0.ministere.chaincacao.com:
  peer0.transformateurs.chaincacao.com:

services:
  ca.producteurs.chaincacao.com:
    image: hyperledger/fabric-ca:1.5
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-producteurs
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=7054
      - FABRIC_CA_SERVER_REGISTRAR_NAME=${CA_ADMIN_NAME}
      - FABRIC_CA_SERVER_REGISTRAR_PASS=${CA_ADMIN_PASSWORD}
      - FABRIC_CA_SERVER_CSR_HOSTS=localhost,127.0.0.1
      - FABRIC_CA_SERVER_DB_TYPE=sqlite3
      - FABRIC_CA_SERVER_DB_DATASOURCE=/tmp/fabric-ca-server.db
    ports:
      - "7054:7054"
    command: fabric-ca-server start -b ${CA_ADMIN_NAME}:${CA_ADMIN_PASSWORD} -d
    healthcheck:
      test: ["CMD", "fabric-ca-client", "getcacert", "-u", "http://localhost:7054"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ../organizations/fabric-ca/producteurs:/etc/hyperledger/fabric-ca-server
    container_name: ca_producteurs
    networks:
      - chaincacao

  ca.exportateurs.chaincacao.com:
    image: hyperledger/fabric-ca:1.5
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-exportateurs
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=8054
      - FABRIC_CA_SERVER_REGISTRAR_NAME=${CA_ADMIN_NAME}
      - FABRIC_CA_SERVER_REGISTRAR_PASS=${CA_ADMIN_PASSWORD}
      - FABRIC_CA_SERVER_CSR_HOSTS=localhost,127.0.0.1
      - FABRIC_CA_SERVER_DB_TYPE=sqlite3
      - FABRIC_CA_SERVER_DB_DATASOURCE=/tmp/fabric-ca-server.db
    ports:
      - "8054:8054"
    command: fabric-ca-server start -b ${CA_ADMIN_NAME}:${CA_ADMIN_PASSWORD} -d
    healthcheck:
      test: ["CMD", "fabric-ca-client", "getcacert", "-u", "http://localhost:8054"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ../organizations/fabric-ca/exportateurs:/etc/hyperledger/fabric-ca-server
    container_name: ca_exportateurs
    networks:
      - chaincacao

  ca.certif.chaincacao.com:
